name: Test, Build, Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: laravel-inertia-todo

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Run PHP tests
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, zip, bcmath, opcache
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run PHPUnit tests
        run: php artisan test --compact

  # ─────────────────────────────────────────────
  # Job 2: Build Docker image and push to ECR
  # ─────────────────────────────────────────────
  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image metadata
        id: meta
        run: |
          SHA_TAG="sha-${{ github.sha }}"
          echo "sha-tag=${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────
  # Job 3: Deploy to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            # Authenticate Docker with ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ needs.build-push.outputs.ecr-registry }}

            cd /home/ec2-user/app

            # Update IMAGE_TAG in EC2's .env file
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ needs.build-push.outputs.image-tag }}|" .env

            # Pull new image and restart container
            docker compose pull
            docker compose up -d --remove-orphans

            # Run migrations (idempotent — safe on every deploy)
            docker compose exec -T app php artisan migrate --force

            # Cache config/routes/views for production performance
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache

            # Clean up old images to stay within ECR/disk limits
            docker image prune -f

            # Health check
            sleep 5
            curl -f http://localhost/up || (echo "Health check failed" && exit 1)

            echo "Deployed: ${{ needs.build-push.outputs.image-tag }}"
