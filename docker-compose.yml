services:
  app:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      APP_NAME: "Todo App"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      BCRYPT_ROUNDS: "12"
    volumes:
      - sqlite_data:/var/www/html/database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/sqlite
